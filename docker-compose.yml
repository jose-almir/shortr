services:
  postgres:
    image: postgres:17-alpine
    container_name: shortr-postgres
    environment:
      POSTGRES_DB: shortr
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: shortr-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
